services:
  app:
    image: node:24-alpine
    container_name: deconstruct-ai-app
    working_dir: /workspace
    command: sh -c "npm install && npm start"
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 5000
      N8N_BASE_URL: http://n8n:5678
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/deconstruct-ai-generate
      N8N_TEMPLATE_RULE_WEBHOOK_URL: http://n8n:5678/webhook/deconstruct-ai-template-rules
      REQUIRE_N8N_ORCHESTRATION: "true"
      FLOWISE_BASE_URL: http://flowise:3000
      FLOWISE_CHATFLOW_ID: 11111111-1111-4111-8111-111111111111
      MCP_HTTP_URL: http://mcp-server:5001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-deconstruct_ai}
      POSTGRES_USER: ${POSTGRES_USER:-deconstruct_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deconstruct_ai}
    ports:
      - "5000:5000"
    volumes:
      - ./:/workspace
      - app_node_modules:/workspace/node_modules
    depends_on:
      - mcp-server
      - flowise
      - n8n
      - postgres
    networks:
      - deconstruct_net

  mcp-server:
    image: node:24-alpine
    container_name: deconstruct-ai-mcp
    working_dir: /workspace/mcp-server
    command: sh -c "npm install && npm start"
    restart: unless-stopped
    environment:
      MCP_PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - ./:/workspace
      - mcp_node_modules:/workspace/mcp-server/node_modules
    networks:
      - deconstruct_net

  flowise:
    image: flowiseai/flowise:latest
    container_name: deconstruct-ai-flowise
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - deconstruct_net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: deconstruct-ai-n8n
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GEMINI_IMAGE_MODEL: gemini-3-pro-image
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
      EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "false"
      N8N_LOG_LEVEL: debug
      N8N_PAYLOAD_SIZE_MAX: "32"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - deconstruct_net

  postgres:
    image: postgres:16-alpine
    container_name: deconstruct-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deconstruct_ai}
      POSTGRES_USER: ${POSTGRES_USER:-deconstruct_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deconstruct_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deconstruct_ai} -d ${POSTGRES_DB:-deconstruct_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deconstruct_net

volumes:
  app_node_modules:
  mcp_node_modules:
  flowise_data:
  n8n_data:
  postgres_data:

networks:
  deconstruct_net:
    driver: bridge
